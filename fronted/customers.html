<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>National Bank - Manage Customers</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .search-box {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        .search-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .search-box button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .customer-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .customer-table th, .customer-table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        .customer-table th {
            background-color: #f8f9fa;
            font-weight: bold;
        }
        .customer-table tr:hover {
            background-color: #f5f5f5;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        .action-buttons button {
            padding: 6px 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .action-buttons .btn-danger {
            background-color: #dc3545;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 600px;
            border-radius: 8px;
        }
        .modal-header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover {
            color: black;
        }
        .modal-body {
            margin-bottom: 15px;
        }
        .modal-body p {
            margin: 10px 0;
            line-height: 1.6;
        }
        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .modal-footer button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-primary {
            background-color: #007bff;
            color: white;
        }
        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-left">
        <h1 class="nav-title">👥 Manage Customers</h1>
        <p class="branch-info">View and manage all customers and their accounts</p>
    </div>
    <button class="logout-btn" onclick="window.location.href='admin.html'">Back to Admin</button>
</div>

<div class="container">
    <div class="row">
        <div class="card full-width">
            <div class="search-box">
                <input id="searchInput" placeholder="Search by Login ID, Name, or Contact..." type="text">
                <button onclick="searchCustomers()">Search</button>
                <button onclick="loadAllCustomers()" style="background-color: #6c757d;">Reset</button>
            </div>

            <table class="customer-table">
                <thead>
                    <tr>
                        <th>Login ID</th>
                        <th>Name</th>
                        <th>Contact</th>
                        <th>Email</th>
                        <th>Internet Banking</th>
                        <th>Accounts</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="customerTableBody">
                    <tr><td colspan="7" style="text-align: center; color: #999;">Loading customers...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Customer Details Modal -->
<div id="customerModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span>Customer Details</span>
            <span class="close" onclick="closeCustomerModal()">&times;</span>
        </div>
        <div class="modal-body" id="customerDetails">
            <!-- Customer details will be loaded here -->
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeCustomerModal()">Close</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script>
function loadAllCustomers() {
    fetchAPI("/customers")
    .then(data => {
        if (data.error) {
            alert("Error: " + data.error);
            return;
        }
        displayCustomers(data);
    })
    .catch(err => alert("Error loading customers: " + err.message));
}

function displayCustomers(customers) {
    const tbody = document.getElementById("customerTableBody");
    
    if (!customers || customers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #999;">No customers found.</td></tr>';
        return;
    }

    let html = "";
    customers.forEach(customer => {
        const accountCount = customer.accounts ? customer.accounts.length : 0;
        const internetBanking = customer.IsInternetBankingEnabled ? "✓ Enabled" : "✗ Disabled";
        
        html += `
            <tr>
                <td><strong>${customer.LoginId}</strong></td>
                <td>${customer.Name}</td>
                <td>${customer.Contact}</td>
                <td>${customer.Email || "-"}</td>
                <td>${internetBanking}</td>
                <td>${accountCount} Account(s)</td>
                <td>
                    <div class="action-buttons">
                        <button onclick="viewCustomerDetails(${customer.CId}, '${customer.LoginId}')">View</button>
                        <button class="btn-danger" onclick="deleteCustomer(${customer.CId})">Delete</button>
                    </div>
                </td>
            </tr>
        `;
    });

    tbody.innerHTML = html;
}

function searchCustomers() {
    const searchTerm = document.getElementById("searchInput").value.trim();
    
    if (!searchTerm) {
        alert("Please enter a search term");
        return;
    }

    fetchAPI(`/customers/search?q=${encodeURIComponent(searchTerm)}`)
    .then(data => {
        if (data.error) {
            alert("Error: " + data.error);
            return;
        }
        displayCustomers(data);
    })
    .catch(err => alert("Error searching customers: " + err.message));
}

function viewCustomerDetails(customerId, loginId) {
    fetchAPI(`/customer/${customerId}`)
    .then(data => {
        if (data.error) {
            alert("Error: " + data.error);
            return;
        }
        
        let accountsHtml = "";
        if (data.accounts && data.accounts.length > 0) {
            data.accounts.forEach(acc => {
                accountsHtml += `
                    <div style="background: #f5f5f5; padding: 10px; margin: 5px 0; border-radius: 4px;">
                        <strong>${acc.AccountType.toUpperCase()}</strong> - ${acc.AccountNumber}<br>
                        Balance: ₹${parseFloat(acc.Balance).toFixed(2)}<br>
                        Status: ${acc.Status}<br>
                        IFSC: ${acc.IFSC}
                    </div>
                `;
            });
        } else {
            accountsHtml = "<p>No accounts found for this customer.</p>";
        }

        const detailsHtml = `
            <p><strong>Login ID:</strong> ${data.customer.LoginId}</p>
            <p><strong>Name:</strong> ${data.customer.Name}</p>
            <p><strong>Contact:</strong> ${data.customer.Contact}</p>
            <p><strong>Email:</strong> ${data.customer.Email || "-"}</p>
            <p><strong>Address:</strong> ${data.customer.Address || "-"}</p>
            <p><strong>DOB:</strong> ${data.customer.DOB}</p>
            <p><strong>Internet Banking:</strong> ${data.customer.IsInternetBankingEnabled ? "✓ Enabled" : "✗ Disabled"}</p>
            <hr>
            <h4>Accounts:</h4>
            ${accountsHtml}
        `;
        
        document.getElementById("customerDetails").innerHTML = detailsHtml;
        document.getElementById("customerModal").style.display = "block";
    })
    .catch(err => alert("Error loading customer details: " + err.message));
}

function closeCustomerModal() {
    document.getElementById("customerModal").style.display = "none";
}

function deleteCustomer(customerId) {
    if (!confirm("Are you sure you want to delete this customer? This action cannot be undone.")) {
        return;
    }

    fetchAPI(`/customer/${customerId}`, {
        method: "DELETE"
    })
    .then(data => {
        if (data.error) {
            alert("Error: " + data.error);
        } else {
            alert("Customer deleted successfully");
            loadAllCustomers();
        }
    })
    .catch(err => alert("Error deleting customer: " + err.message));
}

// Close modal when clicking outside of it
window.onclick = function(event) {
    const modal = document.getElementById("customerModal");
    if (event.target === modal) {
        modal.style.display = "none";
    }
}

// Load all customers on page load
document.addEventListener("DOMContentLoaded", loadAllCustomers);
</script>
</body>
</html>
